<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Impacto - Compost Bariloche</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>

<div class="container">
<nav class="nav-menu">
    <a href="admin.html">⚙️ Panel Admin</a>
    <a href="index.html" class="active">🌱 Vista Vecinos</a>
  </nav>

  <div style="text-align: center; margin-bottom: 20px;">
    <h2>🌱 Mi Impacto Ambiental</h2>
    <p style="color: #4a5568;">Ingresá tu DNI para ver cuánto compostaje vas sumando.</p>
  </div>
  
  <div class="seccion">
    <label for="dniVecino">Tu DNI:</label>
    <input type="text" id="dniVecino" placeholder="Ej: 35123456">
    <button onclick="consultarMisKilos()" style="background-color: #38a169;">Ver mis estadísticas</button>
  </div>

  <div class="seccion" id="panelEstadisticas" style="display:none; text-align: center; background-color: #f0fff4; border: 2px solid #c6f6d5;">
    <h3 id="saludoVecino" style="color: #22543d; margin-bottom: 5px;"></h3>
    <p id="barrioInfo" style="color: #4a5568; margin-top: 0; font-style: italic;"></p>
    <hr style="border: 0; border-top: 1px solid #c6f6d5; margin: 20px 0;">
    <p style="font-size: 16px; margin-bottom: 5px; color: #2d3748;">Tus residuos evitados del vertedero:</p>
    <strong id="misKilos" style="font-size: 42px; color: #2f855a; display: block; margin-bottom: 15px;">0.0 kg</strong>
    <div id="mensajeMotivador" style="font-size: 14px; color: #276749; font-weight: 500; background-color: #fff; padding: 10px; border-radius: 8px;"></div>
  </div>

  <div class="seccion" style="text-align: center; background-color: #edf2f7;">
    <h3>Impacto de Bariloche</h3>
    <p style="font-size: 14px; margin: 0; color: #4a5568;">Total recuperado por la comunidad:</p>
    <strong id="totalGlobal" class="total-kilos" style="font-size: 28px; color: #4a5568;">0.0 kg</strong>
  </div>
</div>

<script type="module" src="vecino.js"></script>

</body>
</html>
